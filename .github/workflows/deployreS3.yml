name: Deploy Frontend to Amazon S3

on:
  push:
    branches: [ "ver02" ]

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET_NAME: sk5th-lsh-cli-web-test # [주의] 배포할 S3 버킷 이름으로 변경해야 합니다.

jobs:
  deploy:
    name: Build and Deploy to S3
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # 1. AWS 인증 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 2. S3에 정적 파일 업로드 (동기화)
    - name: Deploy to Amazon S3
      run: |
        aws s3 sync . s3://${{ env.S3_BUCKET_NAME }} --exclude ".git/*" --exclude ".github/*" --exclude ".gitignore" --exclude "migration_plan.md" --delete


