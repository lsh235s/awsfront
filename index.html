<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETRIS</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="game-wrapper">
        <header class="game-header">
            <h1 class="game-title">TETRIS</h1>
        </header>

        <div class="game-container">
            <!-- Left panel -->
            <div class="side-panel left-panel">
                <div class="info-box">
                    <div class="info-label">SCORE</div>
                    <div class="info-value" id="score">0</div>
                </div>
                <div class="info-box">
                    <div class="info-label">LEVEL</div>
                    <div class="info-value" id="level">1</div>
                </div>
                <div class="info-box">
                    <div class="info-label">LINES</div>
                    <div class="info-value" id="lines">0</div>
                </div>
            </div>

            <!-- Game board -->
            <div class="board-wrapper">
                <canvas id="board" width="300" height="600"></canvas>
                <div class="overlay" id="overlay">
                    <div class="overlay-content">
                        <div class="overlay-title" id="overlay-title">TETRIS</div>
                        <div class="overlay-sub" id="overlay-sub">조작 방법</div>
                        <div class="controls-hint">
                            <div>← → 이동</div>
                            <div>↑ 회전</div>
                            <div>↓ 빠르게</div>
                            <div>SPACE 즉시 낙하</div>
                        </div>
                        <button class="btn-start" id="btn-start">게임 시작</button>
                    </div>
                </div>
            </div>

            <!-- Right panel -->
            <div class="side-panel right-panel">
                <div class="info-box">
                    <div class="info-label">NEXT</div>
                    <canvas id="next-canvas" width="120" height="120"></canvas>
                </div>
                <div class="info-box">
                    <div class="info-label">HOLD</div>
                    <canvas id="hold-canvas" width="120" height="120"></canvas>
                </div>
                <div class="info-box key-guide">
                    <div class="info-label">KEYS</div>
                    <div class="key-list">
                        <div class="key-item"><kbd>←→</kbd> 이동</div>
                        <div class="key-item"><kbd>↑</kbd> 회전</div>
                        <div class="key-item"><kbd>↓</kbd> 소프트</div>
                        <div class="key-item"><kbd>SPC</kbd> 하드낙하</div>
                        <div class="key-item"><kbd>C</kbd> 홀드</div>
                        <div class="key-item"><kbd>P</kbd> 일시정지</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile controls -->
        <div class="mobile-controls">
            <div class="mobile-row">
                <button class="mobile-btn" id="btn-hold">HOLD</button>
                <button class="mobile-btn" id="btn-rotate">↑ 회전</button>
                <button class="mobile-btn" id="btn-pause">PAUSE</button>
            </div>
            <div class="mobile-row">
                <button class="mobile-btn" id="btn-left">←</button>
                <button class="mobile-btn" id="btn-down">↓</button>
                <button class="mobile-btn" id="btn-right">→</button>
            </div>
            <div class="mobile-row">
                <button class="mobile-btn wide" id="btn-drop">SPACE (즉시 낙하)</button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
